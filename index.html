<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陸上短距離 科学的トレーニング・ダッシュボード</title>
<style>
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f8fafc;
    color: #333;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .tabs {
    display: flex;
    background-color: #e2e8f0;
  }
  .tab-button {
    flex: 1;
    padding: 15px 10px;
    text-align: center;
    cursor: pointer;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: bold;
    color: #475569;
    transition: background 0.3s;
  }
  .tab-button.active {
    background-color: #fff;
    color: #1a365d;
    border-bottom: 3px solid #2b6cb0;
  }
  .tab-content {
    display: none;
    padding: 20px;
  }
  .tab-content.active {
    display: block;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #2c5282;
  }
  input[type="number"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    box-sizing: border-box;
    font-size: 16px;
  }
  button.calc-btn {
    width: 100%;
    padding: 12px;
    background-color: #2b6cb0;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }
  button.calc-btn:hover {
    background-color: #1a365d;
  }
  .result-box {
    margin-top: 20px;
    padding: 15px;
    background-color: #f1f5f9;
    border-radius: 5px;
    text-align: center;
  }
  .result-value {
    font-size: 24px;
    font-weight: bold;
    color: #1a365d;
  }
  .warning {
    color: #e53e3e;
    font-weight: bold;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="tabs">
    <button class="tab-button active" onclick="switchTab(event, 'srpe')">sRPE計算<br><small>(疲労度)</small></button>
    <button class="tab-button" onclick="switchTab(event, 'rsi')">RSI計算<br><small>(バネ・神経)</small></button>
    <button class="tab-button" onclick="switchTab(event, 'fv')">F-v簡易診断<br><small>(弱点分析)</small></button>
  </div>

  <div id="srpe" class="tab-content active">
    <h3>sRPE（セッションRPE）計算</h3>
    <div class="form-group">
      <label>練習のきつさ (1〜10)</label>
      <input type="number" id="srpe-intensity" min="1" max="10" placeholder="例: 7">
    </div>
    <div class="form-group">
      <label>練習時間 (分)</label>
      <input type="number" id="srpe-time" min="1" placeholder="例: 120">
    </div>
    <button class="calc-btn" onclick="calcSRPE()">計算する</button>
    <div class="result-box" id="srpe-result-box" style="display:none;">
      <div>sRPEスコア: <span class="result-value" id="srpe-score"></span></div>
      <div id="srpe-warning" class="warning"></div>
    </div>
  </div>

  <div id="rsi" class="tab-content">
    <h3>RSI（反応筋力指数）計算</h3>
    <div class="form-group">
      <label>ジャンプ滞空時間 (秒)</label>
      <input type="number" id="rsi-air" step="0.01" placeholder="例: 0.45">
    </div>
    <div class="form-group">
      <label>接地時間 (秒)</label>
      <input type="number" id="rsi-ground" step="0.01" placeholder="例: 0.20">
    </div>
    <button class="calc-btn" onclick="calcRSI()">計算する</button>
    <div class="result-box" id="rsi-result-box" style="display:none;">
      <div>RSIスコア: <span class="result-value" id="rsi-score"></span></div>
      <div id="rsi-eval" style="margin-top:10px; font-weight:bold;"></div>
    </div>
  </div>

  <div id="fv" class="tab-content">
    <h3>F-v（力-速度）簡易診断</h3>
    <div class="form-group">
      <label>30mブロックスタートタイム (秒)</label>
      <input type="number" id="fv-30m" step="0.01" placeholder="例: 4.50">
    </div>
    <div class="form-group">
      <label>Fly-in 20m 最高速タイム (秒)</label>
      <input type="number" id="fv-20m" step="0.01" placeholder="例: 2.05">
    </div>
    <button class="calc-btn" onclick="calcFV()">診断する</button>
    <div class="result-box" id="fv-result-box" style="display:none;">
      <div>比率: <span class="result-value" id="fv-ratio"></span></div>
      <div id="fv-eval" style="margin-top:10px; font-weight:bold; color:#2c5282;"></div>
    </div>
  </div>
</div>

<script>
  // タブ切り替え処理
  function switchTab(evt, tabName) {
    let tabContents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabContents.length; i++) {
      tabContents[i].classList.remove("active");
    }
    let tabButtons = document.getElementsByClassName("tab-button");
    for (let i = 0; i < tabButtons.length; i++) {
      tabButtons[i].classList.remove("active");
    }
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
  }

  // sRPE計算処理
  function calcSRPE() {
    let intensity = document.getElementById('srpe-intensity').value;
    let time = document.getElementById('srpe-time').value;
    if(intensity && time) {
      let score = intensity * time;
      document.getElementById('srpe-score').innerText = score;
      let warningEl = document.getElementById('srpe-warning');
      if(score > 600) {
        warningEl.innerText = 'スパイク注意：オーバーワークの兆候です。翌週の負荷を下げることを推奨します。';
      } else {
        warningEl.innerText = '適正範囲内です。日々の推移をモニタリングしましょう。';
        warningEl.style.color = '#2b6cb0';
      }
      document.getElementById('srpe-result-box').style.display = 'block';
    }
  }

  // RSI計算処理
  function calcRSI() {
    let air = document.getElementById('rsi-air').value;
    let ground = document.getElementById('rsi-ground').value;
    if(air && ground && ground > 0) {
      let score = (air / ground).toFixed(2);
      document.getElementById('rsi-score').innerText = score;
      let evalEl = document.getElementById('rsi-eval');
      if(score < 1.5) {
        evalEl.innerText = '評価: バネの疲労大・または基礎強化が必要です。';
        evalEl.style.color = '#e53e3e';
      } else if(score >= 1.5 && score <= 2.0) {
        evalEl.innerText = '評価: 標準的です。';
        evalEl.style.color = '#d69e2e';
      } else {
        evalEl.innerText = '評価: バネ良好！高神経刺激（最高速度練習など）が可能です。';
        evalEl.style.color = '#38a169';
      }
      document.getElementById('rsi-result-box').style.display = 'block';
    }
  }

  // F-v計算処理
  function calcFV() {
    let t30 = document.getElementById('fv-30m').value;
    let t20 = document.getElementById('fv-20m').value;
    if(t30 && t20 && t20 > 0) {
      let ratio = (t30 / t20).toFixed(2);
      document.getElementById('fv-ratio').innerText = ratio;
      let evalEl = document.getElementById('fv-eval');
      if(ratio > 2.3) {
        evalEl.innerText = '【力不足型 (Force Deficit)】\nおすすめ: 重いソリ引き、高重量スクワットで初期加速を改善しましょう。';
      } else if(ratio < 2.1) {
        evalEl.innerText = '【速度不足型 (Velocity Deficit)】\nおすすめ: アシスト走、バウンディングでトップスピードを改善しましょう。';
      } else {
        evalEl.innerText = '【バランス型 (Balanced)】\n力と速度のバランスが良い状態です。現在のトレーニングを継続しましょう。';
      }
      document.getElementById('fv-result-box').style.display = 'block';
    }
  }
</script>

</body>
</html>
